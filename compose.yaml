# ── 方圆智版：基础设施地基 (含鉴权总闸) ──────────────────────────────
# 运行命令: docker-compose -f compose.infra.yaml up -d
# ──────────────────────────────────────────────────────────────────

services:

  # 1. PostgreSQL: 核心数据库 (由 Casdoor 与业务 Agent 共享)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fyzj}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fyzj}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis: 共享缓存
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Casdoor: 身份鉴权总闸 (新增)
  casdoor:
    image: casbin/casdoor:latest
    container_name: casdoor
    restart: always
    ports:
      - "8000:8000"
    environment:
      RUN_MODE: dev
      driverName: postgres
      # 关键：通过容器名 'postgres' 直连，并在同一个实例下创建名为 'casdoor' 的库
      dataSourceName: "user=${POSTGRES_USER:-postgres} password=${POSTGRES_PASSWORD:-postgres} host=postgres port=5432 sslmode=disable dbname=casdoor"
    networks:
      - network
    depends_on:
      postgres:
        condition: service_healthy # 只有数据库健康检查通过，才启动鉴权中心

# ── 共享网络 ──────────────────────────────────────────────────────
networks:
  network:
    name: network
    driver: bridge

# ── 持久化数据卷 ──────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
