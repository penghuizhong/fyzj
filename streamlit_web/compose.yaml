# ==============================================================================
# 方圆智版 · Streamlit 管理宇宙
# ==============================================================================

services:
  streamlit_admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fyzb_streamlit_admin
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # 🌟 关键：通过容器名直接呼叫后端 API
      - AGENT_API_URL=http://fyzb_servers:8001
    volumes:
      # 挂载宿主机的文档目录，让 Streamlit 能“预检”文件列表
      - ./data:/app/data
      # 开发时开启源码同步（可选）
      - ./src:/app/src
    networks:
      - fyzb_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8501/_stcore/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  fyzb_network:
    external: true # 引用基础设施定义的外部网络
