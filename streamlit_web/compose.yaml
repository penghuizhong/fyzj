# ==============================================================================
# 方圆智版 · Streamlit 管理宇宙
# ==============================================================================

services:
  streamlit:
    build: .
    restart: unless-stopped
    container_name: streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    networks:
      - network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8501/_stcore/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  network:
    external: true # 引用基础设施定义的外部网络
