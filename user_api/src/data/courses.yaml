courses:
  - title: "裙装原型制版入门"
    description: "专为零基础学员设计的裙装制版课程，从裙装基本原型讲起，详细讲解A字裙、裹裙、塔裙等常见裙型的打版方法。通过大量实例演示，帮助学员掌握量体、算料、制图的核心技能，为后续女装学习打下坚实基础。"
    price: 299.00
    tag: "入门"

  - title: "男装西装制版技术"
    description: "系统学习男式西装的制版工艺，涵盖西装结构分析、前后片划分、袖型设计、领型变化等核心内容。课程包含经典两扣西装、三扣西装及休闲单西的完整打版流程，适合希望进阶男装领域的裁缝从业者。"
    price: 599.00
    tag: "进阶"

  - title: "女装礼服立体裁剪"
    description: "深入学习立体裁剪技术在晚礼服、婚纱、舞台装等高端女装中的应用。课程涵盖人体结构理解、布料垂坠性分析、省道转移技巧、褶皱造型手法等，结合国内外经典礼服案例，培养学员的造型能力和审美水平。"
    price: 899.00
    tag: "高级"

  - title: "童装设计与打版"
    description: "针对4-14岁儿童服装的专项课程，讲解童装人体测量标准、各年龄段规格设置要点。重点教授背带裤、校服、卡通外套、公主裙等童装的打版方法，并涉及安全扣件、舒适面料选用等实用知识。"
    price: 399.00
    tag: "进阶"

  - title: "高级定制量体裁衣"
    description: "高端定制裁缝的核心课程，专注于量体技术、修改工艺和个性化调整。学员将学习如何根据不同体型进行精准量体、假缝试穿、部位调整、归拔熨烫等全流程工艺，培养精细化的手工技艺和客户沟通能力。"
    price: 1299.00
    tag: "高级"

  - title: "服装CAD数字化制版"
    description: "学习使用行业主流CAD软件进行电脑打版，涵盖制版工具使用、样板放缩、排料算料、技术文件输出等功能。课程结合富怡、ET等国内软件及进口软件的操作教学，帮助学员实现从手工到数字化的技术转型。"
    price: 499.00
    tag: "进阶"